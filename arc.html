            <title id="arcTitle">Seismic Shifts — A long arc</title>
            <desc id="arcDesc">A long-arc seismograph showing the presence of Deaf life and signed languages from 65,000 years before present to today. The trace runs at a historical baseline through the deep past of Aboriginal sign languages including Warlpiri and Yolngu, with parallel deep-time traditions including Plains Indian Sign Language. It rises slightly through European institutional emergence in the 18th and 19th centuries — Ponce de León, Bonet, l'Épée, Braidwood, the founding of the American School for the Deaf at Hartford, and Gallaudet College. It plummets sharply at the 1880 Milan Congress, deepens through the eugenics era of Alexander Graham Bell and his contemporaries, the 1907 Indiana sterilisation law, Australian assimilation policies, and the 1933 Nazi sterilisation law and Aktion T4. It rises slowly from 1960 onwards through Stokoe, the naming and recognition of Auslan, Deaf President Now, the official recognition of NZSL, and the 2010 ICED apology for the 1880 resolutions. The trace ends at 2026 still below the historical baseline. The right ten per cent of the page is intentionally left blank — the unwritten near future.</desc>

<script>
(function () {
    var canvas = document.getElementById('arc-canvas');
    var inner = document.getElementById('arc-canvas-inner');
    var hint = document.getElementById('arc-hint');

    var scale = 1;
    var tx = 0;
    var ty = 0;
    var minScale = 0.4;
    var maxScale = 12;

    function apply() {
        inner.style.transform = 'translate(' + tx + 'px, ' + ty + 'px) scale(' + scale + ')';
    }

    // Zoom around a viewport point (px, py).
    function zoomAt(factor, px, py) {
        var newScale = Math.max(minScale, Math.min(maxScale, scale * factor));
        if (newScale === scale) return;
        var ratio = newScale / scale;
        tx = px - (px - tx) * ratio;
        ty = py - (py - ty) * ratio;
        scale = newScale;
        apply();
    }

    function reset() {
        scale = 1; tx = 0; ty = 0;
        apply();
    }

    // Wheel — smooth zoom centred on cursor
    canvas.addEventListener('wheel', function (e) {
        e.preventDefault();
        var rect = canvas.getBoundingClientRect();
        var px = e.clientX - rect.left;
        var py = e.clientY - rect.top;
        var factor = Math.exp(-e.deltaY * 0.0015);
        zoomAt(factor, px, py);
        fadeHint();
    }, { passive: false });

    // Mouse pan
    var isPanning = false;
    var panStart = { x: 0, y: 0, tx: 0, ty: 0 };

    canvas.addEventListener('mousedown', function (e) {
        if (e.button !== 0) return;
        if (e.target.closest('.arc-title, .arc-nav, .arc-controls')) return;
        isPanning = true;
        canvas.classList.add('panning');
        panStart.x = e.clientX;
        panStart.y = e.clientY;
        panStart.tx = tx;
        panStart.ty = ty;
        e.preventDefault();
    });

    window.addEventListener('mousemove', function (e) {
        if (!isPanning) return;
        tx = panStart.tx + (e.clientX - panStart.x);
        ty = panStart.ty + (e.clientY - panStart.y);
        apply();
        fadeHint();
    });

    window.addEventListener('mouseup', function () {
        if (!isPanning) return;
        isPanning = false;
        canvas.classList.remove('panning');
    });

    // Touch — single-finger pan, two-finger pinch
    var touchState = null;

    canvas.addEventListener('touchstart', function (e) {
        if (e.target.closest('.arc-title, .arc-nav, .arc-controls')) return;
        if (e.touches.length === 1) {
            touchState = {
                type: 'pan',
                x: e.touches[0].clientX,
                y: e.touches[0].clientY,
                tx: tx,
                ty: ty
            };
        } else if (e.touches.length === 2) {
            var t1 = e.touches[0], t2 = e.touches[1];
            var dx = t2.clientX - t1.clientX;
            var dy = t2.clientY - t1.clientY;
            var dist = Math.sqrt(dx * dx + dy * dy);
            touchState = {
                type: 'pinch',
                dist: dist,
                cx: (t1.clientX + t2.clientX) / 2,
                cy: (t1.clientY + t2.clientY) / 2,
                scale: scale,
                tx: tx,
                ty: ty
            };
        }
    }, { passive: true });

    canvas.addEventListener('touchmove', function (e) {
        if (!touchState) return;
        e.preventDefault();
        if (touchState.type === 'pan' && e.touches.length === 1) {
            tx = touchState.tx + (e.touches[0].clientX - touchState.x);
            ty = touchState.ty + (e.touches[0].clientY - touchState.y);
            apply();
        } else if (touchState.type === 'pinch' && e.touches.length === 2) {
            var t1 = e.touches[0], t2 = e.touches[1];
            var dx = t2.clientX - t1.clientX;
            var dy = t2.clientY - t1.clientY;
            var dist = Math.sqrt(dx * dx + dy * dy);
            var factor = dist / touchState.dist;
            var newScale = Math.max(minScale, Math.min(maxScale, touchState.scale * factor));
            var ratio = newScale / touchState.scale;
            var rect = canvas.getBoundingClientRect();
            var px = touchState.cx - rect.left;
            var py = touchState.cy - rect.top;
            tx = px - (px - touchState.tx) * ratio;
            ty = py - (py - touchState.ty) * ratio;
            scale = newScale;
            apply();
        }
        fadeHint();
    }, { passive: false });

    canvas.addEventListener('touchend', function () {
        touchState = null;
    });

    // Zoom buttons — zoom from viewport centre
    function centre() {
        var rect = canvas.getBoundingClientRect();
        return { x: rect.width / 2, y: rect.height / 2 };
    }
    document.getElementById('zoom-in').addEventListener('click', function () {
        var c = centre();
        zoomAt(1.25, c.x, c.y);
    });
    document.getElementById('zoom-out').addEventListener('click', function () {
        var c = centre();
        zoomAt(1 / 1.25, c.x, c.y);
    });
    document.getElementById('zoom-reset').addEventListener('click', function () {
        reset();
    });

    // Detail buttons
    var detailButtons = document.querySelectorAll('.detail-btn');
    detailButtons.forEach(function (btn) {
        btn.addEventListener('click', function () {
            var level = btn.getAttribute('data-detail');
            inner.setAttribute('data-detail', level);
            detailButtons.forEach(function (b) {
                if (b.getAttribute('data-detail') === level) {
                    b.setAttribute('aria-pressed', 'true');
                } else {
                    b.removeAttribute('aria-pressed');
                }
            });
        });
    });

    // Hint fade
    var hintTimer;
    function fadeHint() {
        if (!hint || hint.classList.contains('faded')) return;
        clearTimeout(hintTimer);
        hint.classList.add('faded');
    }
    hintTimer = setTimeout(fadeHint, 4500);

    // Keyboard
    window.addEventListener('keydown', function (e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        switch (e.key) {
            case '+': case '=': zoomAt(1.25, centre().x, centre().y); break;
            case '-': case '_': zoomAt(1 / 1.25, centre().x, centre().y); break;
            case '0': reset(); break;
            case '1': case '2': case '3': case '4':
                inner.setAttribute('data-detail', e.key);
                detailButtons.forEach(function (b) {
                    if (b.getAttribute('data-detail') === e.key) {
                        b.setAttribute('aria-pressed', 'true');
                    } else {
                        b.removeAttribute('aria-pressed');
                    }
                });
                break;
        }
    });

    apply();
})();
</script>
