<style>
    /* Override the standard body padding for the fullscreen canvas. */
    body.arc-body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: var(--paper);
        height: 100vh;
        height: 100dvh;
    }

    .arc-canvas {
        position: fixed;
        inset: 0;
        background: var(--paper);
        overflow: hidden;
        cursor: grab;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
    }
    .arc-canvas.panning { cursor: grabbing; }
    .arc-canvas svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
    }

    /* Conditional visibility — driven by data-detail on the SVG itself.
       Levels: 1 minimal · 2 context · 3 annotations · 4 full. */
    .arc-canvas svg[data-detail="1"] .from-l2,
    .arc-canvas svg[data-detail="1"] .from-l3,
    .arc-canvas svg[data-detail="1"] .from-l4,
    .arc-canvas svg[data-detail="2"] .from-l3,
    .arc-canvas svg[data-detail="2"] .from-l4,
    .arc-canvas svg[data-detail="3"] .from-l4 {
        display: none;
    }

    /* Floating bottom-right controls */
    .arc-controls {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 20;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
        max-width: calc(100vw - 48px);
        font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .arc-controls .group {
        display: flex;
        align-items: center;
        gap: 4px;
        background: rgba(244, 239, 230, 0.92);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid var(--hairline);
        border-radius: 4px;
        padding: 6px;
    }
    .arc-controls .group-label {
        font-size: 0.62rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: var(--ink-quiet);
        padding: 0 10px 0 8px;
    }
    .arc-controls button {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid transparent;
        background: transparent;
        color: var(--ink);
        cursor: pointer;
        border-radius: 3px;
        font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.78rem;
        letter-spacing: 0.04em;
        transition: background 100ms ease, color 100ms ease;
        padding: 0;
    }
    .arc-controls button:hover { background: rgba(26, 26, 26, 0.08); }
    .arc-controls button:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
    .arc-controls button svg {
        width: 18px;
        height: 18px;
        display: block;
        fill: currentColor;
    }

    /* Detail — slider with dot marks */
    .detail-dots {
        display: flex;
        align-items: center;
        gap: 18px;
        height: 36px;
        padding: 0 14px;
        position: relative;
    }
    .detail-dots::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 18px;
        right: 18px;
        height: 1px;
        background: var(--hairline);
        z-index: 0;
        transform: translateY(-0.5px);
    }
    .detail-dots .dot {
        width: 10px;
        height: 10px;
        padding: 0;
        border-radius: 50%;
        border: 1px solid var(--ink);
        background: var(--paper);
        cursor: pointer;
        flex: none;
        position: relative;
        z-index: 1;
        transition: transform 120ms ease, background-color 120ms ease;
        font: 0/0 a; /* hide any text content */
        color: transparent;
    }
    .detail-dots .dot:hover { transform: scale(1.45); }
    .detail-dots .dot[aria-checked="true"] { background: var(--ink); }
    .detail-dots .dot:focus-visible {
        outline: 2px solid var(--ink);
        outline-offset: 4px;
    }

    /* Subtle interaction hint — fades after a few seconds */
    .arc-hint {
        position: fixed;
        bottom: 38px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 5;
        font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.62rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: var(--ink-quiet);
        pointer-events: none;
        opacity: 1;
        transition: opacity 1200ms ease;
        white-space: nowrap;
    }
    .arc-hint.faded { opacity: 0; }

    @media (max-width: 720px) {
        .arc-controls .group-label { display: none; }
        .arc-controls { gap: 6px; }
    }

    @media (max-width: 600px) {
        .arc-controls { bottom: 16px; right: 16px; }
    }

        <title id="arcTitle">Seismic Shifts — A long arc</title>
        <desc id="arcDesc">A long-arc seismograph showing the presence of Deaf life and signed languages from 65,000 years before present to today. The trace runs at a historical baseline through the deep past of Aboriginal sign languages including Warlpiri and Yolngu, with parallel deep-time traditions including Plains Indian Sign Language. It rises slightly through European institutional emergence in the 18th and 19th centuries — Ponce de León, Bonet, l'Épée, Braidwood, the founding of the American School for the Deaf at Hartford, and Gallaudet College. It plummets sharply at the 1880 Milan Congress, deepens through the eugenics era of Alexander Graham Bell and his contemporaries, the 1907 Indiana sterilisation law, Australian assimilation policies, and the 1933 Nazi sterilisation law and Aktion T4. It rises slowly from 1960 onwards through Stokoe, the naming and recognition of Auslan, Deaf President Now, the official recognition of NZSL, and the 2010 ICED apology for the 1880 resolutions. The trace ends at 2026 still below the historical baseline. The right ten per cent of the page is intentionally left blank — the unwritten near future.</desc>

<script>
(function () {
    var canvas = document.getElementById('arc-canvas');
    var svg = document.getElementById('arc-svg');
    var hint = document.getElementById('arc-hint');

    // ============================================================
    // Pan and zoom by manipulating the SVG viewBox directly. This
    // re-renders the vector content for any zoom level — strokes
    // and text stay crisp, no rasterisation pixelation.
    // ============================================================

    var origVB = { x: 0, y: 0, w: 1189, h: 841 };
    var vb = { x: origVB.x, y: origVB.y, w: origVB.w, h: origVB.h };
    var minScale = 0.4;
    var maxScale = 16;

    function applyVB() {
        svg.setAttribute('viewBox', vb.x + ' ' + vb.y + ' ' + vb.w + ' ' + vb.h);
    }

    // Compute the rendered region of the SVG inside its bounding rect
    // under preserveAspectRatio="xMidYMid meet".
    function getRender() {
        var rect = svg.getBoundingClientRect();
        var boxAR = origVB.w / origVB.h;
        var rectAR = rect.width / rect.height;
        var renderW, renderH, offsetX, offsetY;
        if (rectAR > boxAR) {
            renderH = rect.height;
            renderW = rect.height * boxAR;
            offsetX = (rect.width - renderW) / 2;
            offsetY = 0;
        } else {
            renderW = rect.width;
            renderH = rect.width / boxAR;
            offsetX = 0;
            offsetY = (rect.height - renderH) / 2;
        }
        return { rect: rect, renderW: renderW, renderH: renderH, offsetX: offsetX, offsetY: offsetY };
    }

    function clampVB(w, h) {
        var scale = origVB.w / w;
        if (scale < minScale) {
            return { w: origVB.w / minScale, h: origVB.h / minScale };
        }
        if (scale > maxScale) {
            return { w: origVB.w / maxScale, h: origVB.h / maxScale };
        }
        return { w: w, h: h };
    }

    function zoomAt(factor, cx, cy) {
        var clamped = clampVB(vb.w / factor, vb.h / factor);
        if (clamped.w === vb.w) return;
        var r = getRender();
        var localX = cx - r.rect.left - r.offsetX;
        var localY = cy - r.rect.top - r.offsetY;
        var sx = vb.x + localX * vb.w / r.renderW;
        var sy = vb.y + localY * vb.h / r.renderH;
        vb.x = sx - localX * clamped.w / r.renderW;
        vb.y = sy - localY * clamped.h / r.renderH;
        vb.w = clamped.w;
        vb.h = clamped.h;
        applyVB();
    }

    function reset() {
        vb = { x: origVB.x, y: origVB.y, w: origVB.w, h: origVB.h };
        applyVB();
    }

    // ============================================================
    // Mouse wheel zoom
    // ============================================================
    canvas.addEventListener('wheel', function (e) {
        if (e.target.closest('header.site, .arc-controls')) return;
        e.preventDefault();
        var factor = Math.exp(-e.deltaY * 0.0015);
        zoomAt(factor, e.clientX, e.clientY);
        fadeHint();
    }, { passive: false });

    // ============================================================
    // Mouse pan
    // ============================================================
    var isPanning = false;
    var panStart = null;

    canvas.addEventListener('mousedown', function (e) {
        if (e.button !== 0) return;
        if (e.target.closest('header.site, .arc-controls')) return;
        isPanning = true;
        canvas.classList.add('panning');
        panStart = {
            x: e.clientX,
            y: e.clientY,
            vbx: vb.x,
            vby: vb.y,
            vbw: vb.w,
            vbh: vb.h
        };
        e.preventDefault();
    });

    window.addEventListener('mousemove', function (e) {
        if (!isPanning || !panStart) return;
        var dx = e.clientX - panStart.x;
        var dy = e.clientY - panStart.y;
        var r = getRender();
        vb.x = panStart.vbx - dx * panStart.vbw / r.renderW;
        vb.y = panStart.vby - dy * panStart.vbh / r.renderH;
        applyVB();
        fadeHint();
    });

    window.addEventListener('mouseup', function () {
        if (!isPanning) return;
        isPanning = false;
        canvas.classList.remove('panning');
    });

    // ============================================================
    // Touch — single-finger pan, two-finger pinch
    // ============================================================
    var touchState = null;

    canvas.addEventListener('touchstart', function (e) {
        if (e.target.closest('header.site, .arc-controls')) return;
        if (e.touches.length === 1) {
            touchState = {
                type: 'pan',
                x: e.touches[0].clientX,
                y: e.touches[0].clientY,
                vbx: vb.x, vby: vb.y, vbw: vb.w, vbh: vb.h
            };
        } else if (e.touches.length === 2) {
            var t1 = e.touches[0], t2 = e.touches[1];
            var dx = t2.clientX - t1.clientX;
            var dy = t2.clientY - t1.clientY;
            var dist = Math.sqrt(dx * dx + dy * dy);
            touchState = {
                type: 'pinch',
                dist: dist,
                cx: (t1.clientX + t2.clientX) / 2,
                cy: (t1.clientY + t2.clientY) / 2,
                vbx: vb.x, vby: vb.y, vbw: vb.w, vbh: vb.h
            };
        }
    }, { passive: true });

    canvas.addEventListener('touchmove', function (e) {
        if (!touchState) return;
        e.preventDefault();
        if (touchState.type === 'pan' && e.touches.length === 1) {
            var dx = e.touches[0].clientX - touchState.x;
            var dy = e.touches[0].clientY - touchState.y;
            var r = getRender();
            vb.x = touchState.vbx - dx * touchState.vbw / r.renderW;
            vb.y = touchState.vby - dy * touchState.vbh / r.renderH;
            applyVB();
        } else if (touchState.type === 'pinch' && e.touches.length === 2) {
            var t1 = e.touches[0], t2 = e.touches[1];
            var dx = t2.clientX - t1.clientX;
            var dy = t2.clientY - t1.clientY;
            var dist = Math.sqrt(dx * dx + dy * dy);
            var factor = dist / touchState.dist;
            var clamped = clampVB(touchState.vbw / factor, touchState.vbh / factor);
            var r = getRender();
            var localX = touchState.cx - r.rect.left - r.offsetX;
            var localY = touchState.cy - r.rect.top - r.offsetY;
            var startSx = touchState.vbx + localX * touchState.vbw / r.renderW;
            var startSy = touchState.vby + localY * touchState.vbh / r.renderH;
            vb.x = startSx - localX * clamped.w / r.renderW;
            vb.y = startSy - localY * clamped.h / r.renderH;
            vb.w = clamped.w;
            vb.h = clamped.h;
            applyVB();
        }
        fadeHint();
    }, { passive: false });

    canvas.addEventListener('touchend', function () {
        touchState = null;
    });

    // ============================================================
    // Zoom and reset buttons
    // ============================================================
    function viewportCentre() {
        var rect = svg.getBoundingClientRect();
        return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
    }
    document.getElementById('zoom-in').addEventListener('click', function () {
        var c = viewportCentre();
        zoomAt(1.3, c.x, c.y);
    });
    document.getElementById('zoom-out').addEventListener('click', function () {
        var c = viewportCentre();
        zoomAt(1 / 1.3, c.x, c.y);
    });
    document.getElementById('zoom-reset').addEventListener('click', function () {
        reset();
    });

    // ============================================================
    // Detail dots
    // ============================================================
    var dots = document.querySelectorAll('.detail-dots .dot');
    function setDetail(level) {
        svg.setAttribute('data-detail', String(level));
        dots.forEach(function (d) {
            d.setAttribute('aria-checked', d.getAttribute('data-detail') === String(level) ? 'true' : 'false');
        });
    }
    dots.forEach(function (d) {
        d.addEventListener('click', function () {
            setDetail(d.getAttribute('data-detail'));
        });
    });

    // ============================================================
    // Hint fade
    // ============================================================
    var hintTimer;
    function fadeHint() {
        if (!hint || hint.classList.contains('faded')) return;
        clearTimeout(hintTimer);
        hint.classList.add('faded');
    }
    hintTimer = setTimeout(fadeHint, 4500);

    // ============================================================
    // Keyboard
    // ============================================================
    window.addEventListener('keydown', function (e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        switch (e.key) {
            case '+': case '=': {
                var c = viewportCentre();
                zoomAt(1.3, c.x, c.y);
                break;
            }
            case '-': case '_': {
                var c = viewportCentre();
                zoomAt(1 / 1.3, c.x, c.y);
                break;
            }
            case '0': reset(); break;
            case '1': case '2': case '3': case '4':
                setDetail(e.key);
                break;
        }
    });

    applyVB();
})();
</script>
